- !policy
  id: jwt-apps/k8s
  owner: !group k8s-admins
  body:
  - !host
    id: system:serviceaccount:cityapp:cityapp-summon
    annotations:
      authn-jwt/k8s/kubernetes.io/namespace: cityapp
      authn-jwt/k8s/kubernetes.io/serviceaccount/name: cityapp-summon

- !grant
  roles:
  - !group conjur/authn-jwt/k8s/apps
  - !layer test/test_hosts
  members:
  - !host jwt-apps/k8s/system:serviceaccount:cityapp:cityapp-summon
