---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cityapp-hardcode
---
apiVersion: v1
kind: Service
metadata:
  name: cityapp-hardcode
  labels:
    app: cityapp-hardcode
spec:
  ports:
  - port: 80
    nodePort: 30080
    name: http
  selector:
    app: cityapp-hardcode
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: cityapp-hardcode
  name: cityapp-hardcode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cityapp-hardcode
  template:
    metadata:
      labels:
        app: cityapp-hardcode
    spec:
      serviceAccountName: cityapp-hardcode
      hostAliases:
      - ip: "{LAB_IP}"
        hostnames:
        - "{DB_HOST}"
      containers:
      - image: localhost/cityapp:php
        imagePullPolicy: IfNotPresent
        name: cityapp
        env:
          - name: DBADDR
            value: '{DB_HOST}'
          - name: DBUSER
            value: '{DB_USER}'
          - name: DBPASS
            value: '{DB_PASSWORD}'
        ports:
        - containerPort: 80
          name: http
