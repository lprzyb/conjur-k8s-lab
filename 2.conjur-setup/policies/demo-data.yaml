- !policy
  id: test
  body:
    - !layer
      id: test_hosts
    - !host
      id: testhost01
    - !grant
      role: !layer test_hosts
      member: !host testhost01
    - !host-factory
      id: test_hosts
      layers: !layer test_hosts
    - !group
      id: test_users
    - !user
      id: testuser01
    - !grant
      role: !group test_users
      member: !user testuser01
    - &variables
      - !variable CityApp/DBAccount/address
      - !variable CityApp/DBAccount/username
      - !variable CityApp/DBAccount/password
      - !variable CityAppESO/DBAccountESO/address
      - !variable CityAppESO/DBAccountESO/username
      - !variable CityAppESO/DBAccountESO/password
    - !permit
      resource: *variables
      privileges: [ read, execute ]
      roles: !layer test_hosts
    - !permit
      resource: *variables
      privileges: [ read, execute ]
      roles: !group test_users
