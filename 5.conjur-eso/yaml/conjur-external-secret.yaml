apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: conjur
spec:
  refreshInterval: 55s
  secretStoreRef:
    # This name must match the metadata.name in the SecretStore
    name: conjur
    kind: SecretStore
  target:
    name: conjur-secret
  data:
  # secretKey names match what cityapp's file-based lookup expects under
  # /etc/secret-volume (see 3.cityapp-setup/build/index.php), so the same
  # cityapp image can be reused here unmodified.
  - secretKey: dbaddr
    remoteRef:
      key: test/CityAppESO/DBAccountESO/address
  - secretKey: dbuser
    remoteRef:
      key: test/CityAppESO/DBAccountESO/username
  - secretKey: dbpass
    remoteRef:
      key: test/CityAppESO/DBAccountESO/password
