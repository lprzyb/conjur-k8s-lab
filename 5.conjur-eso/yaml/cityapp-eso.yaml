---
apiVersion: v1
kind: Service
metadata:
  name: cityapp-eso
  labels:
    app: cityapp-eso
spec:
  ports:
  - port: 80
    nodePort: 30084
    name: http
  selector:
    app: cityapp-eso
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: cityapp-eso
  name: cityapp-eso
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cityapp-eso
  template:
    metadata:
      labels:
        app: cityapp-eso
    spec:
      # No Conjur awareness needed here at all - ESO already resolved the
      # secret into a plain k8s Secret, so cityapp just mounts it like any
      # other Kubernetes-native app would. Contrast with 3.cityapp-setup's
      # sidecar-based variants, which need a ServiceAccount + JWT projection.
      hostAliases:
      - ip: "{LAB_IP}"
        hostnames:
        - "{DB_HOST}"
      containers:
      - name: cityapp
        image: localhost/cityapp:php
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - name: secret-volume
            mountPath: /etc/secret-volume
            readOnly: true
        ports:
        - containerPort: 80
          name: http
      volumes:
        - name: secret-volume
          secret:
            secretName: conjur-secret
